<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Medicação — Daniel</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Work+Sans:wght@400;500;600&display=swap');

:root {
  --bg: #FAF6EF;
  --card: #FFFFFF;
  --ink: #262220;
  --ink-soft: #6B645C;
  --teal: #3B6E68;
  --teal-soft: #E4EEEC;
  --coral: #DD6A50;
  --coral-soft: #FBE7E1;
  --sand: #E9E1D2;
}
* { box-sizing: border-box; }
body { margin: 0; }
.loading-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg); color: var(--ink-soft); font-family: 'Work Sans', sans-serif;
}
.app {
  min-height: 100vh; background: var(--bg); color: var(--ink);
  font-family: 'Work Sans', sans-serif; padding: 28px 18px 60px;
}
.hero { max-width: 640px; margin: 0 auto 28px; }
.eyebrow { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--teal); margin: 0 0 6px; font-weight: 600; }
.hero h1 { font-family: 'Fraunces', serif; font-size: 40px; font-weight: 600; margin: 0; line-height: 1.05; }
.dates { color: var(--ink-soft); margin: 4px 0 18px; font-size: 14px; }
.progress-track { position: relative; height: 22px; border-radius: 999px; background: var(--sand); overflow: hidden; }
.progress-fill { height: 100%; background: var(--teal); transition: width 0.3s ease; }
.progress-text { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: 600; color: white; mix-blend-mode: difference; }
.cards { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }
.card { background: var(--card); border: 1px solid var(--sand); border-radius: 18px; padding: 20px; }
.card.double { display: flex; flex-direction: column; gap: 24px; }
.card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.card-head h2 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; margin: 0 0 3px; }
.instruction { color: var(--ink-soft); font-size: 13px; margin: 0; }
.tag { font-size: 11px; font-weight: 600; color: var(--teal); background: var(--teal-soft); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
.days-grid { margin-top: 16px; display: flex; gap: 20px; overflow-x: auto; padding-bottom: 4px; }
.day-col { flex: 0 0 auto; min-width: 92px; }
.day-label { font-size: 12px; font-weight: 600; color: var(--ink-soft); margin: 0 0 8px; }
.day-date { font-weight: 400; opacity: 0.7; }
.day-doses { display: flex; flex-direction: column; gap: 8px; }
.day-doses.wrap { flex-direction: row; flex-wrap: wrap; margin-top: 14px; }
.simple-med:not(:last-child) { padding-bottom: 20px; border-bottom: 1px solid var(--sand); }
.capsule {
  position: relative; display: flex; align-items: center; gap: 8px;
  border: 1.5px solid var(--sand); background: var(--card); border-radius: 999px;
  padding: 8px 14px 8px 8px; cursor: pointer; font-family: 'Work Sans', sans-serif;
  transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  text-align: left; width: 100%;
}
.capsule:active { transform: scale(0.97); }
.capsule-half { width: 14px; height: 22px; flex: 0 0 auto; }
.capsule-left { background: var(--teal); border-radius: 8px 0 0 8px; }
.capsule-right { background: var(--sand); border-radius: 0 8px 8px 0; margin-left: -14px; clip-path: inset(0 0 0 50%); }
.capsule-label { display: flex; flex-direction: column; line-height: 1.15; }
.capsule-line1 { font-size: 13px; font-weight: 600; }
.capsule-line2 { font-size: 11px; color: var(--ink-soft); }
.capsule-check { margin-left: auto; color: var(--teal); font-weight: 700; font-size: 14px; }
.capsule[data-checked="true"] { background: var(--teal-soft); border-color: var(--teal); }
.capsule[data-checked="true"] .capsule-right { background: var(--teal); }
.capsule[data-overdue="true"] { border-color: var(--coral); background: var(--coral-soft); }
.capsule[data-next="true"]:not([data-overdue="true"]) { border-color: var(--teal); box-shadow: 0 0 0 2px var(--teal-soft); }
.foot { max-width: 640px; margin: 30px auto 0; text-align: center; color: var(--ink-soft); font-size: 12px; }
@media (min-width: 640px) {
  .card.double { flex-direction: row; }
  .simple-med { flex: 1; }
  .simple-med:not(:last-child) { border-bottom: none; border-right: 1px solid var(--sand); padding-bottom: 0; padding-right: 24px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function generateTimedDoses(start, intervalHours, totalDays) {
  const dosesPerDay = 24 / intervalHours;
  const total = dosesPerDay * totalDays;
  return Array.from({ length: total }, (_, i) => {
    const dt = new Date(start.getTime() + i * intervalHours * 3600 * 1000);
    return { day: Math.floor(i / dosesPerDay) + 1, time: dt };
  });
}

const CLARITRO_START = new Date(2026, 6, 1, 12, 20);
const ACETIL_START = new Date(2026, 6, 1, 8, 0);

const SCHEDULE = {
  claritro: {
    name: "Claritromicina 500mg",
    instruction: "1 comprimido de 12/12h",
    days: 7,
    doses: generateTimedDoses(CLARITRO_START, 12, 7),
  },
  acetil: {
    name: "Acetilcisteína 200mg",
    instruction: "1 sachê diluído em água, de 8/8h",
    days: 7,
    doses: generateTimedDoses(ACETIL_START, 8, 7),
  },
  loratadina: {
    name: "Loratadina 10mg",
    instruction: "1 comprimido, 1x ao dia — sem horário fixo",
    days: 5,
  },
  prednisona: {
    name: "Prednisona 20mg",
    instruction: "1 comprimido, 1x ao dia — sem horário fixo",
    days: 5,
  },
};

const STORAGE_KEY = "med-tracker-state-v1";

function defaultState() {
  return {
    claritro: SCHEDULE.claritro.doses.map((_, i) => i === 0),
    acetil: SCHEDULE.acetil.doses.map(() => false),
    loratadina: Array(5).fill(false),
    prednisona: Array(5).fill(false),
  };
}

function fmtTime(d) { return d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }); }
function fmtDate(d) { return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" }); }

function Capsule({ checked, overdue, next, onClick, label, sub }) {
  return (
    <button onClick={onClick} className="capsule"
      data-checked={checked} data-overdue={overdue && !checked} data-next={next && !checked}>
      <span className="capsule-half capsule-left" />
      <span className="capsule-half capsule-right" />
      <span className="capsule-label">
        <span className="capsule-line1">{label}</span>
        {sub && <span className="capsule-line2">{sub}</span>}
      </span>
      {checked && <span className="capsule-check">✓</span>}
    </button>
  );
}

function ProgressBar({ done, total }) {
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  return (
    <div className="progress-track">
      <div className="progress-fill" style={{ width: `${pct}%` }} />
      <span className="progress-text">{done}/{total}</span>
    </div>
  );
}

function MedTracker() {
  const [state, setState] = useState(null);
  const [now, setNow] = useState(new Date());
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const tick = setInterval(() => setNow(new Date()), 60000);
    return () => clearInterval(tick);
  }, []);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      setState(raw ? JSON.parse(raw) : defaultState());
    } catch (e) {
      setState(defaultState());
    }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded || !state) return;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }, [state, loaded]);

  if (!loaded || !state) {
    return <div className="loading-screen"><span>carregando…</span></div>;
  }

  const toggle = (key, idx) => {
    setState((prev) => {
      const copy = { ...prev, [key]: [...prev[key]] };
      copy[key][idx] = !copy[key][idx];
      return copy;
    });
  };

  const totals = Object.keys(SCHEDULE).reduce((acc, key) => {
    const arr = state[key];
    acc.done += arr.filter(Boolean).length;
    acc.total += arr.length;
    return acc;
  }, { done: 0, total: 0 });

  return (
    <div className="app">
      <header className="hero">
        <p className="eyebrow">painel de medicação</p>
        <h1>Daniel</h1>
        <p className="dates">01 – 07 de julho de 2026</p>
        <ProgressBar done={totals.done} total={totals.total} />
      </header>

      <main className="cards">
        {["claritro", "acetil"].map((key) => {
          const med = SCHEDULE[key];
          const checks = state[key];
          const done = checks.filter(Boolean).length;
          const nextIdx = checks.findIndex((c) => !c);

          const byDay = {};
          med.doses.forEach((d, i) => {
            byDay[d.day] = byDay[d.day] || [];
            byDay[d.day].push({ ...d, idx: i });
          });

          return (
            <section className="card" key={key}>
              <div className="card-head">
                <div>
                  <h2>{med.name}</h2>
                  <p className="instruction">{med.instruction}</p>
                </div>
                <span className="tag">{med.days} dias</span>
              </div>
              <ProgressBar done={done} total={checks.length} />
              <div className="days-grid">
                {Object.entries(byDay).map(([dayNum, doses]) => (
                  <div className="day-col" key={dayNum}>
                    <p className="day-label">Dia {dayNum} <span className="day-date">{fmtDate(doses[0].time)}</span></p>
                    <div className="day-doses">
                      {doses.map((d) => (
                        <Capsule key={d.idx} checked={checks[d.idx]} overdue={d.time < now}
                          next={d.idx === nextIdx} label={fmtTime(d.time)} onClick={() => toggle(key, d.idx)} />
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </section>
          );
        })}

        <section className="card double">
          {["loratadina", "prednisona"].map((key) => {
            const med = SCHEDULE[key];
            const checks = state[key];
            const done = checks.filter(Boolean).length;
            return (
              <div className="simple-med" key={key}>
                <div className="card-head">
                  <div>
                    <h2>{med.name}</h2>
                    <p className="instruction">{med.instruction}</p>
                  </div>
                  <span className="tag">{med.days} dias</span>
                </div>
                <ProgressBar done={done} total={checks.length} />
                <div className="day-doses wrap">
                  {checks.map((c, i) => (
                    <Capsule key={i} checked={c} overdue={false} next={false}
                      label={`Dia ${i + 1}`} onClick={() => toggle(key, i)} />
                  ))}
                </div>
              </div>
            );
          })}
        </section>
      </main>

      <footer className="foot">
        <p>toque numa cápsula para marcar como tomada · toque de novo para desfazer</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MedTracker />);
</script>
</body>
</html>
